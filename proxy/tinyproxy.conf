# tinyproxy config for the secure-exec installer egress proxy.
#
# Role: the ONLY host with outbound reachability in the install topology. The
# installer container sits on an `--internal` Docker network (no NAT/route to
# the internet) whose only other member is this proxy; the proxy additionally
# joins an egress network to reach PyPI. So this proxy is both the sole network
# path out (enforced at L3 by the topology) AND the host allow-list authority
# (enforced here at L7). See CLAUDE.md "Two-phase model".

# Run in the foreground so it is the container's PID 1 and logs to stdout.
LogLevel Info

# Listen on all interfaces inside the proxy container, port 8888. The container
# is only reachable on the internal proxy network, so this is not exposed widely.
Port 8888
Listen 0.0.0.0
Timeout 600

# --- Who may USE the proxy (the installer subnet) ---
# Docker user-defined networks use 172.16.0.0/12 by default. Restrict clients to
# RFC1918 ranges so only co-networked containers (the installer) can connect.
Allow 127.0.0.1
Allow 10.0.0.0/8
Allow 172.16.0.0/12
Allow 192.168.0.0/16

# --- Where the proxy may go (the L7 allow-list) ---
# FilterDefaultDeny: refuse every host EXCEPT those matching the Filter file.
Filter "/etc/tinyproxy/allowlist"
FilterDefaultDeny Yes
FilterExtended On
# Match against the hostname (CONNECT target / Host header), not resolved IPs.
FilterURLs Off

# HTTPS goes through CONNECT; permit only the standard web ports so the proxy
# can't be used to reach arbitrary TCP services on the allow-listed hosts.
ConnectPort 443
ConnectPort 80

# Don't leak proxy identity / via headers downstream.
DisableViaHeader Yes